[[permission]]
identifier = "allow-feed-commands"
description = "Allows the bundled Mouser interface to access its RSS, archive, settings, and browser commands."
commands.allow = [
    "get_articles_page",
    "refresh_feeds",
    "get_feed_sources",
    "save_feed_sources",
    "archive_article",
    "reinstate_article",
    "delete_article",
    "open_external_url",
    "get_storage_info",
]
